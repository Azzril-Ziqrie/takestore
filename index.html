<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Take Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" aria-label="Sidebar">
      <div class="brand">
        <a href="#" class="logo" aria-label="Home">
          <img class="logoImg" src="IMG_6340_logo_transparent.png" alt="Logo" />
        </a>
        <button class="iconBtn mobileOnly" id="menuClose" aria-label="Close menu">✕</button>
      </div>

      <div class="cartLine">
        <span class="cartIcon" aria-hidden="true"></span>
        <span class="muted"><span id="cartCount"></span><span id="cartTotal"></span></span>
      </div>

      <nav class="nav" aria-label="Navigation">
        <div class="navSectionTitle">Products</div>

        <div class="searchBox">
          <input
            id="productSearch"
            class="searchInput"
            type="search"
            placeholder="Search products..."
            autocomplete="off"
          />
        </div>

        <a class="navLink" href="#new-arrivals">New arrivals</a>
        <a class="navLink" href="#tshirts">T-shirts</a>
        <a class="navLink" href="#canvas">Canvas</a>
        <a class="navLink" href="#keychain">Keychain</a>

        <a
          class="navLink"
          href="https://www.instagram.com/takesomesouvenir/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram
        </a>

        <hr class="navDivider" />
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- HERO -->
      <section class="hero" id="hero">
        <div class="heroCanvas">
          <img class="heroImg" src="cover.jpeg" alt="" />
        </div>
      </section>

      <!-- T-SHIRTS -->
      <section class="section" id="tshirts">
        <div class="sectionHeader">
          <h2 class="sectionTitle">T-SHIRTS</h2>
        </div>

        <div class="productsGrid">

          <!-- PRODUCT 1 -->
          <article class="productCard">
            <div class="productMedia">
              <img src="images/BREAKDOWN TAKE BLACK TEE.webp" />
            </div>

            <h3 class="productTitle">BREAKDOWN TAKE BLACK TEE</h3>

            <div class="productMeta">
              <span class="oldPrice">Rp.180.000</span>
              <span class="newPrice">Rp.150.000</span>
            </div>

            <div class="buyRow">
              <select class="sizeSelect">
                <option selected>Choose size</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
              </select>
              <button class="buyBtn" data-price="Rp.150.000">Order</button>
            </div>
          </article>

          <!-- PRODUCT 2 -->
          <article class="productCard">
            <div class="productMedia">
              <img src="images/BREAKDOWN TAKE NAVY TEE.webp" />
            </div>

            <h3 class="productTitle">BREAKDOWN TAKE NAVY TEE</h3>

            <div class="productMeta">
              <span class="oldPrice">Rp.180.000</span>
              <span class="newPrice">Rp.150.000</span>
            </div>

            <div class="buyRow">
              <select class="sizeSelect">
                <option selected>Choose size</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
              </select>
              <button class="buyBtn" data-price="Rp.150.000">Order</button>
            </div>
          </article>

          <!-- PRODUCT 3 -->
          <article class="productCard">
            <div class="productMedia">
              <img src="images/TAKE OVER THE WORLD BLACK TEE.webp" />
            </div>

            <h3 class="productTitle">TAKE OVER THE WORLD BLACK TEE</h3>

            <div class="productMeta">
              <span class="oldPrice">Rp.180.000</span>
              <span class="newPrice">Rp.150.000</span>
            </div>

            <div class="buyRow">
              <select class="sizeSelect">
                <option selected>Choose size</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
              </select>
              <button class="buyBtn" data-price="Rp.150.000">Order</button>
            </div>
          </article>

          <!-- PRODUCT 4 -->
          <article class="productCard">
            <div class="productMedia">
              <img src="images/TAKE OVER THE WORLD NAVY TEE.webp" />
            </div>

            <h3 class="productTitle">TAKE OVER THE WORLD NAVY TEE</h3>

            <div class="productMeta">
              <span class="oldPrice">Rp.180.000</span>
              <span class="newPrice">Rp.150.000</span>
            </div>

            <div class="buyRow">
              <select class="sizeSelect">
                <option selected>Choose size</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
              </select>
              <button class="buyBtn" data-price="Rp.150.000">Order</button>
            </div>
          </article>

        </div>
      </section>

    </main>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
