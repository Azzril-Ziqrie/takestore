  </div>

  <script>
    const nomorWA = "62895324360400";

    document.querySelectorAll(".buyBtn").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (btn.classList.contains("soldOut") || btn.disabled) return;

        const card = btn.closest(".productCard");
        const namaBarang = card.querySelector(".productTitle")?.innerText?.trim() || "Product";
        const harga = btn.dataset.price || "";
        const sizeSelect = card.querySelector(".sizeSelect");

        let pesan = `Hello, I would like to order this item:\n`;
        pesan += `Item name: ${namaBarang}\n`;

        if (harga) {
          pesan += `Price: ${harga}\n`;
        }

        if (sizeSelect) {
          const size = sizeSelect.value;
          if (size === "Choose size") {
            alert("Please select a size first.");
            return;
          }
          pesan += `Size: ${size}\n`;
        }

        const urlWA = `https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`;
        window.location.href = urlWA;
      });
    });
  </script>
